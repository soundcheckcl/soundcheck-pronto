<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SoundCheck — Pronto</title>
<meta name="description" content="SoundCheck — El lugar donde los músicos encuentran a quienes los ayudan a sonar mejor. Técnicos, profes y salas de ensayo, en un solo lugar." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0E1A19;
    --teal: #14B8A6;
    --text: #E0F7F5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Manrope", system-ui, sans-serif;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(24px, 5vw, 56px);
    position: relative;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Subtle background depth: tenue glow behind the logo */
  body::before {
    content: "";
    position: absolute;
    top: 38%;
    left: 50%;
    width: min(78vw, 720px);
    aspect-ratio: 1;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle at center,
      rgba(20, 184, 166, 0.16) 0%,
      rgba(20, 184, 166, 0.07) 34%,
      rgba(20, 184, 166, 0) 68%);
    pointer-events: none;
    z-index: 0;
  }

  /* Soft vignette for depth */
  body::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 120% 90% at 50% 42%,
      rgba(0, 0, 0, 0) 52%,
      rgba(0, 0, 0, 0.32) 100%);
    pointer-events: none;
    z-index: 0;
  }

  main {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(20px, 4vh, 36px);
    max-width: 640px;
    width: 100%;
    max-width: 100%;
    padding-left: 24px;
    padding-right: 24px;
    box-sizing: border-box;
    overflow-x: hidden;
  }

  /* ---- Logo ---- */
  .logo {
    display: flex;
    align-items: flex-end;
    gap: clamp(12px, 2.4vw, 18px);
  }

  .logo svg {
    width: clamp(58px, 11vw, 84px);
    height: auto;
    display: block;
    overflow: visible;
  }

  .logo .bar {
    fill: var(--teal);
    transform-box: fill-box;
    transform-origin: bottom center;
    animation: eq 2.4s ease-in-out infinite;
  }

  .logo .bar.peak  { animation-duration: 2.9s; }
  .logo .bar.b1 { animation-delay: -0.2s; }
  .logo .bar.b2 { animation-delay: -1.1s; }
  .logo .bar.b3 { animation-delay: -0.6s; }
  .logo .bar.b4 { animation-delay: -1.7s; }
  .logo .bar.b5 { animation-delay: -0.9s; }
  .logo .bar.b6 { animation-delay: -1.4s; opacity: 0.55; }

  @keyframes eq {
    0%, 100% { transform: scaleY(1); }
    50%      { transform: scaleY(0.74); }
  }

  .wordmark {
    font-family: "Syne", sans-serif;
    font-weight: 700;
    font-size: clamp(28px, 5.4vw, 44px);
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }

  /* ---- Headline ---- */
  .headline {
    font-family: "Syne", sans-serif;
    font-weight: 700;
    font-size: clamp(56px, 18vw, 140px);
    line-height: 0.92;
    letter-spacing: -0.035em;
    color: var(--text);
    margin-top: clamp(4px, 1.5vh, 14px);
  }

  .subline {
    font-family: "Manrope", sans-serif;
    font-weight: 500;
    font-size: clamp(16px, 2.4vw, 21px);
    line-height: 1.5;
    color: rgba(224, 247, 245, 0.78);
    max-width: 30ch;
    text-wrap: balance;
  }

  .tagline {
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: clamp(13px, 1.8vw, 16px);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal);
    margin-top: clamp(2px, 1vh, 8px);
  }

  /* ---- Instagram link ---- */
  .ig {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-family: "JetBrains Mono", monospace;
    font-weight: 400;
    font-size: clamp(13px, 1.7vw, 15px);
    letter-spacing: 0.02em;
    color: var(--teal);
    text-decoration: none;
    padding: 10px 18px;
    border: 1px solid rgba(20, 184, 166, 0.32);
    border-radius: 999px;
    transition: background-color 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
  }

  .ig svg { width: 16px; height: 16px; display: block; }

  .ig:hover {
    background-color: rgba(20, 184, 166, 0.1);
    border-color: rgba(20, 184, 166, 0.6);
    transform: translateY(-1px);
  }

  /* ---- Footer ---- */
  footer {
    position: absolute;
    bottom: clamp(18px, 4vh, 34px);
    left: 0;
    right: 0;
    z-index: 1;
    font-family: "JetBrains Mono", monospace;
    font-weight: 400;
    font-size: clamp(11px, 1.4vw, 13px);
    letter-spacing: 0.04em;
    color: rgba(224, 247, 245, 0.42);
  }

  footer a { color: inherit; text-decoration: none; transition: color 0.2s ease; }
  footer a:hover { color: var(--teal); }

  @media (prefers-reduced-motion: reduce) {
    .logo .bar { animation: none; }
  }
</style>
</head>
<body>
  <main>
    <div class="logo" aria-label="SoundCheck">
      <svg viewBox="0 0 58 44" role="img" aria-hidden="true">
        <rect class="bar b1"        x="1"  y="21" width="6" height="23" rx="3" />
        <rect class="bar b2 peak"   x="11" y="4"  width="6" height="40" rx="3" />
        <rect class="bar b3"        x="21" y="16" width="6" height="28" rx="3" />
        <rect class="bar b4"        x="31" y="32" width="6" height="12" rx="3" />
        <rect class="bar b5"        x="41" y="24" width="6" height="20" rx="3" />
        <rect class="bar b6"        x="51" y="15" width="6" height="29" rx="3" />
      </svg>
      <span class="wordmark" style="font-weight: 700">SoundCheck</span>
    </div>

    <h1 class="headline" style="font-weight: 700">Pronto.</h1>

    <p class="subline">Estamos construyendo el lugar donde los músicos encuentran todo lo que necesitan para sonar mejor. Técnicos, profes y salas de ensayo, en un solo lugar.</p>

    <p class="tagline">Suena bien.</p>

    <a class="ig" href="https://instagram.com/getsoundcheck" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="5.5" />
        <circle cx="12" cy="12" r="4.2" />
        <circle cx="17.6" cy="6.4" r="1.1" fill="currentColor" stroke="none" />
      </svg>
      @getsoundcheck
    </a>
  </main>

  <footer>
    © 2026 SoundCheck · <a href="mailto:hola@soundcheck.cl">hola@soundcheck.cl</a>
  </footer>
</body>
</html>
